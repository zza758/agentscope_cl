app:
  project_name: "agentscope_cl"
  experiment_name: "stage1_baseline"
  debug: true

model:
  provider: "dashscope"
  model_name: "qwen-plus"
  temperature: 0.3
  max_tokens: 1500
  stream: false

database:
  host: "127.0.0.1"
  port: 3306
  user: "root"
  database: "agentscope_cl"
  charset: "utf8mb4"

knowledge_base:
  kb_path: "data/kb/docs.jsonl"
  top_k: 3
  score_threshold: 1.0

memory:
  enabled: true
  backend: "vector"         # "keyword" / "vector"
  persistent: true
  deduplicate: true
  top_k: 3
  storage_path: "data/memory/memory_bank.jsonl"

embedding:
  enabled: true
  provider: "dashscope"
  model_name: "text-embedding-v4"
  batch_size: 16
  normalize: true

ablation:
  use_knowledge_base: true
  use_memory: true
  use_memory_write: true
  use_memory_persistence: true
  use_retrieval_logging: true
  use_memory_logging: true
  use_vector_memory: true
  use_contrastive_rerank: true
  use_rl_policy: false
  use_memory_policy: true
  expose_reasoning: true

memory_policy:
  max_select_k: 3
  min_summary_len: 10

rl_policy:
  alpha: 0.5
  max_select_k: 3
  min_summary_len: 10
  model_path: "outputs/rl_policy/linucb_state.json"
  log_path: "outputs/rl_policy/decision_log.jsonl"
  online_update: false
  write_reward: 0.1
  hit_reward: 1.5
  miss_penalty: -0.8

contrastive:
  enabled: true
  train_enabled: true
  rerank_enabled: true

  train_data_path: "data/contrastive/baseline_12_hard/memory_contrastive_samples.jsonl"
  output_dir: "outputs/contrastive"
  model_dir: "outputs/contrastive/contrastive_encoder"

  model_name_or_path: "/root/hf_models/bert-base-chinese"
  max_length: 128
  batch_size: 8
  num_epochs: 3
  learning_rate: 2e-5
  margin: 0.2
  hidden_size: 768

  candidate_top_k: 5
  final_top_k: 3

eval:
  output_dir: "outputs/eval"
