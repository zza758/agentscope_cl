app:
  project_name: "agentscope_cl"
  experiment_name: "stage1_baseline"
  debug: true

model:
  provider: "dashscope"
  model_name: "qwen-plus"
  temperature: 0.3
  max_tokens: 1500
  stream: false


database:
  host:
  port:
  user:
  database:
  charset:
  enabled: false

knowledge_base:
  kb_path: "data/kb/docs.jsonl"
  top_k: 3
  score_threshold: 1.0

memory:
  enabled: true
  backend: "vector"   # "keyword" / "vector"
  persistent: true
  deduplicate: true
  top_k: 3
  storage_path: "data/memory/memory_bank.jsonl"

embedding:
  enabled: true
  provider: "dashscope"
  model_name: "text-embedding-v4"
  batch_size: 16
  normalize: true

ablation:
  use_knowledge_base: true
  use_memory: true
  use_memory_write: true
  use_memory_persistence: true
  use_retrieval_logging: true
  use_memory_logging: true
  use_vector_memory: true
  use_contrastive_rerank: true
  use_rl_policy: false
  use_memory_policy: true
  expose_reasoning: true

memory_policy:
  max_select_k: 3
  min_summary_len: 10

memory_quality_gate:
  enabled: true
  reject_unknown: true
  reject_placeholder: true
  min_summary_len_default: 8
  min_summary_len_by_task_type:
    decomposition_qa: 4
    comparison: 10
    focused_summary: 8
    suggestion: 8
  unknown_patterns:
    - "未知"
    - "未提供"
    - "无法确定"
    - "不清楚"
    - "信息不足"
    - "unknown"
    - "not provided"
    - "cannot determine"
  placeholder_patterns:
    - "#1"
    - "#2"
    - "#3"
    - "#4"
    - "#5"
    - "#\\d+"
  weak_patterns:
    - "需要进一步查询"
    - "需进一步查询"
    - "根据历史经验"

rl_policy:
  alpha: 0.5
  max_select_k: 3
  min_summary_len: 10
  model_path: "outputs/rl_policy/linucb_state.json"
  log_path: "outputs/rl_policy/decision_log.jsonl"
  online_update: false
  write_reward: 0.1
  hit_reward: 1.5
  miss_penalty: -0.8

contrastive:
  enabled: true
  train_enabled: true
  rerank_enabled: true
  train_data_path: "data/contrastive/baseline_12_hard/memory_contrastive_samples.jsonl"
  output_dir: "outputs/contrastive"
  model_dir: "outputs/contrastive/contrastive_encoder"
  model_name_or_path: "intfloat/multilingual-e5-base"
  device: "cuda"
  max_length: 128
  batch_size: 16
  num_epochs: 3
  learning_rate: 2e-5
  margin: 0.2
  hidden_size: 768
  candidate_top_k: 5
  final_top_k: 3

eval:
  output_dir: "outputs/eval"

llm:
  provider: local_vllm
  model_name: Qwen/Qwen2.5-7B-Instruct
  base_url: http://127.0.0.1:8000/v1
  api_key: EMPTY
  temperature: 0.1
  max_tokens: 384
  stream: false
